<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/assets/images.jpg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    
    
</head>
<body>
    <main class="container">
        
        <header class="input-container">
            <input class="city-input" placeholder="Search City">
            <button class="search-button">
                
              <span class="material-symbols-outlined">
search
</span> 
            </button>
            
        </header>
        <section class="weather-location" style="display: none;">
            <div class="location-date-container">
                <div class="location">
                   <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
  <circle cx="12" cy="10" r="3"></circle>
</svg>
                    <h4 class="country-text">Berhampur</h4>

                </div>
                <h5 class="current-date-txt regular-text">Wed, 10 June</h5>
            </div>
            <div class="weather-summary-container">
                <img src="assets/weather/clouds.svg"  class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-text">29 °C</h1>
                    <h3 class="condition-text regular-text">Clouds</h3>
                </div>
                
            </div>
            <div class="weather-condition-container">
                <div class="condition-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-droplet" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M7.21.8C7.69.295 8 0 8 0q.164.544.371 1.038c.812 1.946 2.073 3.35 3.197 4.6C12.878 7.096 14 8.345 14 10a6 6 0 0 1-12 0C2 6.668 5.58 2.517 7.21.8m.413 1.021A31 31 0 0 0 5.794 3.99c-.726.95-1.436 2.008-1.96 3.07C3.304 8.133 3 9.138 3 10a5 5 0 0 0 10 0c0-1.201-.796-2.157-2.181-3.7l-.03-.032C9.75 5.11 8.5 3.72 7.623 1.82z"/>
  <path fill-rule="evenodd" d="M4.553 7.776c.82-1.641 1.717-2.753 2.093-3.13l.708.708c-.29.29-1.128 1.311-1.907 2.87z"/>
</svg>
 <div class="condition-info">
                    <h5 class="regular-text">Humidity</h5>
                    <h5 class="humidity-value-txt">55%</h5>
                </div>
</div>
               
                <div class="condition-item">
            <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
            <div class="condition-info">
            <h5 class=" regular-text">Wind Speed</h5>
            <h5 class="wind-value-txt">2 M/s</h5>
            </div>
            </div>
            
            </div>
        </div>
    </div>
         <div class="forecast-items-container">
            <div class="forecast-item">
                <h5 class="forecast-item-date regular-text">05 June</h5>
                <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                <h5 class="forecast-item-temp">29 °C</h5>
            </div>
             <div class="forecast-item">
                <h5 class="forecast-item-date regular-text">05 June</h5>
                <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                <h5 class="forecast-item-temp">29 °C</h5>
            </div>
             <div class="forecast-item">
                <h5 class="forecast-item-date regular-text">05 June</h5>
                <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                <h5 class="forecast-item-temp">29 °C</h5>
            </div>
             <div class="forecast-item">
                <h5 class="forecast-item-date regular-text">05 June</h5>
                <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                <h5 class="forecast-item-temp">29 °C</h5>
            </div>
            
         </div>       
            
        </section>

    <section class="search-city section-message">
        <img src="assets/message/to.avif" class="search-id">
         <div>
            <h1>Search City</h1>
            <h4 class="credit regular-text"><br>Weather Web<br>
                ~ Ayush Misra</h4>
         </div>
    </section>

    <section class="not-found section-message" style="display: none;">
        <img src="assets/message/not-found.png">
         <div>
            <h1>Search City</h1>
            <h4 class="regular-text">Error</h4>
            <button class ="reset"onclick="location.reload()">Refresh Page</button>
         </div>
    </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
